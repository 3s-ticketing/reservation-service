services:
  postgres:
    image: postgres:16
    container_name: ticketing-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ticketing}
      POSTGRES_USER: ${POSTGRES_USER:-ticketing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local}
      TZ: Asia/Seoul
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - ticketing-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ticketing} -d ${POSTGRES_DB:-ticketing}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ticketing-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-16379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - ticketing-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  ticketing-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data: