server:
  port: 0

spring:
  application:
    name: reservation-service

  config:
    import: "optional:configserver:http://localhost:8888"

  datasource:
    url: jdbc:postgresql://localhost:5432/mydatabase
    username: myuser
    password: secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  eureka:
    client:
      service-url:
        defaultZone: http://localhost:8761/eureka
