server:
  port: 8082

spring:
  application:
    name: reservation-service

  cloud:
    config:
      enabled: false

  datasource:
    # currentSchema=reservation: 엔티티에 schema 미명시이므로 JDBC search_path 로 강제.
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:15432}/${POSTGRES_DB:ticketing}?currentSchema=reservation
    username: ${POSTGRES_USER:ticketing}
    password: ${POSTGRES_PASSWORD:ticketing1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none          # Flyway 가 스키마 단일 소유자. Hibernate 는 검증 안 함.
    show-sql: true

  data:
    redis:
      host: localhost
      port: 16379

  flyway:
    enabled: true
    schemas: reservation
    locations: classpath:db/migration
    baseline-on-migrate: true # 기존 DB가 있을 경우 대비

  # 3. Kafka 비활성화 (필요 시 주석 해제하여 사용)
  # 지금은 Kafka 컨테이너를 안 띄우므로 설정이 있으면 에러가 날 수 있음
#  kafka:
#    enabled: false
#    bootstrap-servers: localhost:19092 # 외부 포트 기준

# 4. Eureka 비활성화 유지
eureka:
  client:
    enabled: false

# 커스텀 토픽 이름 (재정의 가능)
#topics:
#  match:
#    canceled: match.canceled
#  reservation:
#    confirmed: reservation.confirmed
#    canceled: reservation.canceled

