server:
  port: 8081

spring:
  application:
    name: reservation-service

  cloud:
    config:
      enabled: false

  datasource:
    # currentSchema=reservation: 엔티티에 schema 미명시이므로 JDBC search_path 로 강제.
    # env 값 우선, 없으면 .env 와 동일한 로컬 기본값으로 fallback.
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:15432}/${POSTGRES_DB:ticketing}?currentSchema=reservation
    username: ${POSTGRES_USER:ticketing}
    password: ${POSTGRES_PASSWORD:ticketing1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  data:
    redis:
      host: localhost
      port: 16379

  flyway:
    enabled: true
    schemas: reservation
    locations: classpath:db/migration
    baseline-on-migrate: true # 기존 DB가 있을 경우 대비

  kafka:
    bootstrap-servers: localhost:19092
    consumer:
      group-id: ${spring.application.name}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# 4. Eureka 비활성화 유지
eureka:
  client:
    enabled: false

# 토픽 이름
topics:
  payment:
    completed: payment.completed
    failed: payment.failed
    refunded: payment.refunded
  match:
    canceled: match.canceled
  reservation:
    canceled: reservation.canceled
    confirmation:
      failed: reservation.confirmation.failed

kafka:
  topic:
    partitions: 3
    replicas: 1

# 좌석 HOLD 만료 스케줄러 (HOLD → EXPIRE_PENDING 전이)
# 결제 윈도우(10분) 경과 여부를 30초마다 점검한다.
# Feign 미구현 구간에서는 UNKNOWN 반환 → TTL 자연 만료(1분 유예)에 위임.
scheduler:
  hold-expiry:
    delay-ms: 30000

feign:
   payment-service:
      url: http://localhost:8082