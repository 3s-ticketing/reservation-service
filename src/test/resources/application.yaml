# 테스트 전용 설정.
# 도메인 브런치에서는 외부 인프라(Postgres / Kafka / Eureka / ConfigServer)가 없으므로
# 컨텍스트 로딩만 검증할 수 있도록 임베디드 H2 + 외부 의존성 비활성화로 덮어쓴다.
server:
  port: 0

spring:
  application:
    name: reservation-service

  cloud:
    config:
      enabled: false
      import-check:
        enabled: false
    discovery:
      enabled: false

  datasource:
    url: jdbc:h2:mem:reservationdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_schema: PUBLIC

  flyway:
    enabled: false

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: reservation-service-test
      auto-offset-reset: earliest

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

# 테스트에서 참조될 수 있는 토픽 자리표시자
topics:
  match:
    canceled: match.canceled
  reservation:
    confirmed: reservation.confirmed
    canceled: reservation.canceled

scheduler:
  held-seat-expiry:
    delay-ms: 30000
